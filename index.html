<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для моей любимой</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>Я тебя люблю!</h1>
        <p>Ты — самое лучшее, что случилось со мной. Спасибо за твою улыбку и тепло.</p>
        
        <!-- Интерактивная кнопка -->
        <button onclick="revealSecret()">Нажми сюда, солнце</button>
        
        <!-- Скрытый текст, который появится после клика -->
        <div id="secret-message" class="hidden">
            <p>Ты прекрасна каждую секунду! И с каждым днем я люблю тебя все сильнее. ✨</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
