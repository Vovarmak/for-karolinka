                <p style="color: #ff4d6d !important; font-weight: bold; margin: 0; font-size: 15px; line-height: 1.4; --darkreader-inline-color: #ff4d6d !important;">Good girl😘You are my sunshine, my only sunshine, you make me happy and I LOVE YOU!❤️‍🔥</p>
            </div>
        </div>

        <!-- ПРАВОЕ ОКОШКО (z-index: -10 и pointer-events: none, защита от перекрытия!) -->

                    <div style="font-size: 9px; color: #ff4d6d; margin-top: -5px; line-height: 1;">❤️</div>
                    <div style="width: 2px; height: 42px; background: #ff4d6d;"></div>
                    <div style="font-size: 8px; color: #ff758f; margin-bottom: -4px; line-height: 1; transform: rotate(180deg);">🔻</div>
